<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <main>
    <article class="blog-card">
      <img src="illustration-article.svg" alt="Illustration image" class="blog-image">
      <div class="blog-content">
        <h2 class="blog-title">Learning</h2>
        <p class="blog-published">Published 21 Dec 2023</p>
        <p class="blog-excerpt"><a href="#" class="excerpt-link">HTML & CSS foundations</a></p>
        <p class="blog-author"> These languages are the backbone of every website, defining structure, content, and
          presentation.</p>

        <div class="blog-author-avatar">
          <img class="blog-author-image" src="image-avatar.webp" alt="Image avatar">
          <p class="blog-author-name">Greg Hooper</p>
        </div>
      </div>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/ndilisa">Ndilisa Kula</a>.
  </footer>
</body>

</html>
